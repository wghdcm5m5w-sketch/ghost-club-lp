# XcodeGen 設定ファイル ＝ このプロジェクトの「唯一の正」(source of truth)
#
# ▼ 重要: TetsuLog.xcodeproj は **このファイルから生成する成果物** であり、git 管理しない。
#   ビルド前に必ず次を実行する（Mac, この app/ ディレクトリで）:
#       brew install xcodegen   # 初回のみ
#       xcodegen generate       # project.yml → TetsuLog.xcodeproj / *.entitlements を生成
#   その後 TetsuLog.xcodeproj を Xcode で開いてビルド/アーカイブする。
#   Signing&Capabilities をXcodeのUIで触っても再生成で消えるため、
#   署名・Capability・entitlements は全てこの project.yml に書く（下記参照）。
#
# ▼ 構成: 本体(iOS) + テスト + ウィジェット(iOS) + Apple Watch アプリ + Watchコンプリ の5ターゲット。
#   CloudKit / App Groups / ライブアクティビティを含むフル構成。
#
# ▼ Bundle ID と開発チーム
#   PRODUCT_BUNDLE_IDENTIFIER と DEVELOPMENT_TEAM を自分のものに変更すること。

name: TetsuLog
options:
  bundleIdPrefix: com.ryofujimatsu
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    # 開発者の Apple Developer Team ID。自分のIDに変更する
    # （Xcode › Settings › Accounts、または developer.apple.com › Membership で確認）。
    DEVELOPMENT_TEAM: R329LXJQXR
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    # App Intents の SSU 学習ステップ(AppIntentsSSUTraining)が
    # 環境によって nonzero exit で失敗するため無効化。
    ENABLE_APP_SHORTCUTS_FLEXIBLE_MATCHING: NO

targets:
  TetsuLog:
    type: application
    platform: iOS
    sources:
      # 本体ソースのみ（ウィジェット用フォルダは最小構成では含めない）
      - path: TetsuLog
        excludes:
          # ウィジェットは別ターゲット。最小構成では除外。
          - "**/TetsuLogWidgets/**"
    info:
      path: TetsuLog/Info.plist
      properties:
        CFBundleDisplayName: TetsuLog
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "編成番号を読み取って記録するためにカメラを使用します。画像は端末内でのみ処理されます。"
        NSLocationWhenInUseUsageDescription: "撮影地の位置や、記録に添える現在地の取得に位置情報を使用します。位置情報が外部に送信されることはありません。"
        NSPhotoLibraryUsageDescription: "記録に写真を添付するためにフォトライブラリへアクセスします。"
        NSMicrophoneUsageDescription: "走行音や駅メロディなどを録音して記録するためにマイクを使用します。音声は端末内にのみ保存されます。"
        NSFaceIDUsageDescription: "記録の閲覧を Face ID で保護するために使用します。"
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryofujimatsu.tetsulog
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    # ▼ Capabilities は project.yml が正。再生成で確実に復元される。
    #   本体: App Group（ウィジェット/Watchと共有）+ iCloud/CloudKit（Private DB同期）。
    #   ※ Push(aps-environment) はここに固定しない。CloudKitの基本同期には不要で、
    #     App IDにPushが無い状態でアーカイブ署名が失敗する事故を避けるため。
    #     プッシュ更新型ライブアクティビティ等で必要になったら Xcode で
    #     Push Notifications を有効化し、ここに aps-environment を追記する。
    entitlements:
      path: TetsuLog/TetsuLog.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ryofujimatsu.tetsulog
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.ryofujimatsu.tetsulog
        com.apple.developer.icloud-services:
          - CloudKit
    dependencies:
      # ウィジェット拡張を本体に埋め込む
      - target: TetsuLogWidgetsExtension
        embed: true
      # Apple Watch アプリを本体に埋め込む
      - target: TetsuLogWatch
        embed: true

  TetsuLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TetsuLogTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryofujimatsu.tetsulog.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TetsuLog.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TetsuLog"
        SWIFT_VERSION: "5.0"
    dependencies:
      - target: TetsuLog

  TetsuLogWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: TetsuLogWatch
      # 共有モデル（本体と同じ実装を参照）
      - path: TetsuLog/Models/Models.swift
      - path: TetsuLog/Models/SharedStore.swift
    info:
      path: TetsuLogWatch/Info.plist
      properties:
        CFBundleDisplayName: TetsuLog
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.ryofujimatsu.tetsulog
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryofujimatsu.tetsulog.watchapp
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "4"   # Apple Watch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon   # Watchアプリのアイコン
    # Watch は別デバイス。App Group は端末内（Watchアプリ↔Watchコンプリ）共有用。
    # iCloud/CloudKit で iPhone と同じ Private DB を Watch 自身が同期して読む。
    entitlements:
      path: TetsuLogWatch/TetsuLogWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ryofujimatsu.tetsulog
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.ryofujimatsu.tetsulog
        com.apple.developer.icloud-services:
          - CloudKit
    dependencies:
      # 文字盤コンプリケーション拡張を Watch アプリに埋め込む
      - target: TetsuLogWatchWidgets
        embed: true

  TetsuLogWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: TetsuLogWatchWidgets
      # 本体と共有するモデル・共有ストア
      - path: TetsuLog/Models/Models.swift
      - path: TetsuLog/Models/SharedStore.swift
    info:
      path: TetsuLogWatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: TetsuLog
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryofujimatsu.tetsulog.watchapp.cmpl
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: NO
    # Watchコンプリは Watchアプリが同期したローカルストアを App Group 経由で読むだけ。
    entitlements:
      path: TetsuLogWatchWidgets/TetsuLogWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ryofujimatsu.tetsulog

  TetsuLogWidgetsExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: TetsuLogWidgets
      # 本体と共有するモデル・共有ストア・ライブアクティビティ属性
      - path: TetsuLog/Models/Models.swift
      - path: TetsuLog/Models/SharedStore.swift
      - path: TetsuLog/Features/RideActivityAttributes.swift
    info:
      path: TetsuLogWidgets/Info.plist
      properties:
        CFBundleDisplayName: TetsuLog
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryofujimatsu.tetsulog.widgets
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
    # iOSウィジェットは本体と同じ App Group のストアをローカル読み取り（iCloud権限は不要）。
    entitlements:
      path: TetsuLogWidgets/TetsuLogWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ryofujimatsu.tetsulog
