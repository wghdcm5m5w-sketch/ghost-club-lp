# XcodeGen 設定ファイル
# Mac で `brew install xcodegen` 後、この app/ ディレクトリで `xcodegen generate` を実行すると
# TetsuLog.xcodeproj が生成される。手作業のファイル取り込み・ターゲット設定が不要になる。
#
# ▼ まず動かす（最小構成・推奨）
#   この設定は「本体アプリのみ・ローカル保存」。無料Apple IDでも実機で動く。
#   CloudKit / ウィジェット / ライブアクティビティは含めない（後述の手順で追加）。
#
# ▼ Bundle ID と開発チーム
#   PRODUCT_BUNDLE_IDENTIFIER と DEVELOPMENT_TEAM を自分のものに変更すること。
#   （Xcode で一度ターゲットの Signing で Team を選べば DEVELOPMENT_TEAM は空でも可）

name: TetsuLog
options:
  bundleIdPrefix: com.ryofujimatsu
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""          # ←自分のTeam IDを入れるか、Xcodeで選択
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    # App Intents の SSU 学習ステップ(AppIntentsSSUTraining)が
    # 環境によって nonzero exit で失敗するため無効化。
    ENABLE_APP_SHORTCUTS_FLEXIBLE_MATCHING: NO

targets:
  TetsuLog:
    type: application
    platform: iOS
    sources:
      # 本体ソースのみ（ウィジェット用フォルダは最小構成では含めない）
      - path: TetsuLog
        excludes:
          # ウィジェットは別ターゲット。最小構成では除外。
          - "**/TetsuLogWidgets/**"
    info:
      path: TetsuLog/Info.plist
      properties:
        CFBundleDisplayName: TetsuLog
        UILaunchScreen: {}
        NSCameraUsageDescription: "編成番号を読み取って記録するためにカメラを使用します。画像は端末内でのみ処理されます。"
        NSLocationWhenInUseUsageDescription: "撮影地の記録と、狙いの編成の接近アラートに位置情報を使用します。位置情報が外部に送信されることはありません。"
        NSPhotoLibraryUsageDescription: "記録に写真を添付するためにフォトライブラリへアクセスします。"
        NSMicrophoneUsageDescription: "走行音や駅メロディなどを録音して記録するためにマイクを使用します。音声は端末内にのみ保存されます。"
        NSFaceIDUsageDescription: "記録の閲覧を Face ID で保護するために使用します。"
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryofujimatsu.tetsulog
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      # ウィジェット拡張を本体に埋め込む
      - target: TetsuLogWidgetsExtension
        embed: true
      # Apple Watch アプリを本体に埋め込む
      - target: TetsuLogWatch
        embed: true
    # ▼ Capabilities（iCloud/App Groups/Push）は Xcode の Signing & Capabilities で付与する。
    #   xcodegen で entitlements を自動生成したい場合は各ターゲットに entitlements: を追加。

  TetsuLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TetsuLogTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryofujimatsu.tetsulog.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TetsuLog.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TetsuLog"
        SWIFT_VERSION: "5.0"
    dependencies:
      - target: TetsuLog

  TetsuLogWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: TetsuLogWatch
      # 共有モデル（本体と同じ実装を参照）
      - path: TetsuLog/Models/Models.swift
      - path: TetsuLog/Models/SharedStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryofujimatsu.tetsulog.watchapp
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "4"   # Apple Watch
    dependencies:
      # 文字盤コンプリケーション拡張を Watch アプリに埋め込む
      - target: TetsuLogWatchWidgets
        embed: true

  TetsuLogWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: TetsuLogWatchWidgets
      # 本体と共有するモデル・共有ストア
      - path: TetsuLog/Models/Models.swift
      - path: TetsuLog/Models/SharedStore.swift
    info:
      path: TetsuLogWatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: TetsuLog
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryofujimatsu.tetsulog.watchapp.complication
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: NO

  TetsuLogWidgetsExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: TetsuLogWidgets
      # 本体と共有するモデル・共有ストア・ライブアクティビティ属性
      - path: TetsuLog/Models/Models.swift
      - path: TetsuLog/Models/SharedStore.swift
      - path: TetsuLog/Features/RideActivityAttributes.swift
    info:
      path: TetsuLogWidgets/Info.plist
      properties:
        CFBundleDisplayName: TetsuLog
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryofujimatsu.tetsulog.widgets
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
